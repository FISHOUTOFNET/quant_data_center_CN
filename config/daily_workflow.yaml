steps:
  - id: cleanup
    name: cleanup expired logs
    schedule_policy: daily
    state_key_policy: run_instance
    resume_policy: always_run
    data_freshness_policy: maintenance
    command: ["{python}", "-m", "src.tools.log_cleanup", "--retention-days", "30"]
    optional: true

  - id: calendar
    name: update-baostock-daily calendar
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command:
      - "{qdc}"
      - update-baostock-daily
      - "--dataset"
      - baostock_cn_trading_calendar
      - "--end"
      - "{candidate_date}"
      - "--no-build-duckdb-views"

  - id: akshare-delist
    name: akshare update delist
    schedule_policy: market_window
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command: ["{qdc}", "akshare", "update", "--target", "delist", "--end", "{market_date}", "--no-build-duckdb-views"]

  - id: akshare-spot-quote
    name: akshare update spot_quote
    schedule_policy: daily
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command: ["{qdc}", "akshare", "update", "--target", "spot_quote", "--end", "{market_date}", "--no-build-duckdb-views"]
    optional: true

  - id: baostock-basic
    name: update-baostock-daily stock basic
    schedule_policy: daily
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command: ["{qdc}", "update-baostock-daily", "--dataset", "baostock_cn_stock_basic", "--end", "{market_date}", "--no-build-duckdb-views"]

  - id: baostock-market-session
    name: update-baostock-market-session
    schedule_policy: daily
    state_key_policy: market_date
    resume_policy: always_run
    data_freshness_policy: market_session
    command:
      - "{qdc}"
      - update-baostock-market-session
      - "--end"
      - "{market_date}"
      - "--natural-date"
      - "{natural_date}"
      - "--candidate-date"
      - "{candidate_date}"
      - "--market-date"
      - "{market_date}"
      - "--no-build-duckdb-views"
    depends_on:
      - step: baostock-basic
        state_key_policy: market_date

  - id: baostock-valuation-percentile
    name: update-baostock-valuation-percentile
    schedule_policy: daily
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command: ["{qdc}", "update-baostock-valuation-percentile", "--no-build-duckdb-views"]
    depends_on:
      - step: baostock-market-session
        state_key_policy: market_date

  - id: akshare-yjyg-em
    name: akshare update yjyg_em incremental
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: natural_daily
    command: ["{qdc}", "akshare", "update", "--target", "yjyg_em", "--mode", "incremental", "--no-build-duckdb-views"]
    optional: true
    timeout_seconds: 900

  - id: akshare-valuation-full
    name: akshare update valuation full
    schedule_policy: market_window
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command: ["{qdc}", "akshare", "update", "--target", "valuation", "--mode", "full", "--end", "{market_date}", "--no-build-duckdb-views"]

  - id: akshare-report-disclosure
    name: akshare update report_disclosure
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: natural_daily
    command: ["{qdc}", "akshare", "update", "--target", "report_disclosure", "--no-build-duckdb-views"]

  - id: akshare-yysj-em
    name: akshare update yysj_em
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: natural_daily
    command: ["{qdc}", "akshare", "update", "--target", "yysj_em", "--no-build-duckdb-views"]

  - id: akshare-daily-bar
    name: akshare update daily_bar incremental all from {hist_start}
    schedule_policy: market_window
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command:
      - "{qdc}"
      - akshare
      - update
      - "--target"
      - daily_bar
      - "--mode"
      - incremental
      - "--adjustment"
      - all
      - "--start"
      - "{hist_start}"
      - "--end"
      - "{market_date}"
      - "--no-build-duckdb-views"

  - id: sync-qlib
    name: sync-qlib
    schedule_policy: market_window
    state_key_policy: market_date
    resume_policy: skip_if_success
    data_freshness_policy: market_session
    command: ["{qdc}", "sync-qlib", "--target-date", "{market_date}", "--allow-weekday", "--no-build-duckdb-views", "--max-runtime-seconds", "7200"]

  - id: financial-report
    name: akshare update financial_report incremental
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: natural_daily
    command: ["{qdc}", "akshare", "update", "--target", "financial_report", "--mode", "incremental", "--no-build-duckdb-views"]

  - id: build-derived
    name: build canonical derived datasets
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: natural_daily
    command: ["{qdc}", "build-derived", "--target", "all", "--mode", "incremental", "--no-build-duckdb-views"]
    depends_on:
      - step: akshare-spot-quote
        state_key_policy: market_date
      - step: baostock-basic
        state_key_policy: market_date
      - step: baostock-market-session
        state_key_policy: market_date
      - step: baostock-valuation-percentile
        state_key_policy: market_date
      - step: financial-report
        state_key_policy: natural_date
      - step: akshare-delist
        state_key_policy: market_date
      - step: akshare-valuation-full
        state_key_policy: market_date
      - step: akshare-daily-bar
        state_key_policy: market_date
      - step: sync-qlib
        state_key_policy: market_date

  - id: build-duckdb-views
    name: build-duckdb-views
    schedule_policy: daily
    state_key_policy: natural_date
    resume_policy: skip_if_success
    data_freshness_policy: natural_daily
    command: ["{qdc}", "build-duckdb-views"]
    depends_on:
      - step: build-derived
        state_key_policy: natural_date
