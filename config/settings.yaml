project:
  name: quant_data_center
  timezone: Asia/Shanghai

paths:
  data_dir: data
  raw_dir: data/raw
  parquet_dir: data/parquet
  metadata_dir: data/metadata
  duckdb_dir: data/duckdb
  logs_dir: logs

api:
  provider: baostock
  baostock:
    adjustflag_map:
      none: "3"
      qfq: "2"
      hfq: "1"
  akshare:
    max_retries: 3
    workers: 3
    jitter_seconds: [2, 8]
    lookback_quarters: 8
    endpoints:
      stock_institute_hold:
        source: sina
        failure_threshold: 5
        cooldown_minutes: 30
      stock_value_em:
        source: eastmoney
        failure_threshold: 5
        cooldown_minutes: 30

datasets:
  daily_k:
    names:
      - daily_k_none
      - daily_k_qfq
      - daily_k_hfq
    fields: "date,code,open,high,low,close,preclose,volume,amount,adjustflag,turn,tradestatus,pctChg,peTTM,pbMRQ,psTTM,pcfNcfTTM,isST"
    frequency: d
  stock_basic:
    fields: "code,code_name,ipoDate,outDate,type,status"
  calendar:
    fields: "calendar_date,is_trading_day"
  adjust_factor:
    fields: "code,dividOperateDate,foreAdjustFactor,backAdjustFactor,adjustFactor"
  stock_institute_hold:
    start_quarter: 2005Q1
  stock_value_em:
    active_only: true

pipeline:
  lookback_days: 10
  raw_cache_days: 7
  max_retries: 3
  default_code: sh.600000
  metadata_flush_size: 200
  background_workers: 4

storage:
  duckdb_file: data/duckdb/quant.duckdb

logging:
  file: logs/qdc.log
